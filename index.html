<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>RTM Training</title>

<style>
body {
    margin: 0;
    font-family: "Segoe UI", Arial;
    background: #cfc6b8;
}

/* HEADER */
.header {
    background: #e30613;
    padding: 12px 30px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.logo {
    height: 35px;
}

.icon {
    height: 28px;
    opacity: 0.7;
}

/* CONTAINER */
.container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 80vh;
}

/* CARD */
.card {
    width: 420px;
    background: rgba(255,255,255,0.95);
    padding: 30px;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    animation: fadeIn 0.4s ease;
}

/* ANIMAÇÃO */
@keyframes fadeIn {
    from {opacity: 0; transform: translateY(10px);}
    to {opacity: 1; transform: translateY(0);}
}

h3 {
    margin-bottom: 20px;
}

/* OPTIONS */
.option {
    border: 2px solid #e30613;
    padding: 12px;
    margin: 10px 0;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.2s;
}

.option:hover {
    background: #ffe5e5;
    transform: scale(1.02);
}

/* BUTTON */
button {
    background: #e30613;
    color: white;
    border: none;
    padding: 12px;
    width: 100%;
    border-radius: 10px;
    cursor: pointer;
    font-size: 15px;
}

button:hover {
    background: #b3000f;
}

/* FOOTER */
.footer {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: #e30613;
    color: white;
    text-align: center;
    padding: 8px;
    font-size: 13px;
}

.hidden {
    display: none;
}
</style>
</head>

<body>

<div class="header">
    <img src="logo.png" class="logo">
    <img src="icon.png" class="icon">
</div>

<div class="container">

    <div id="startScreen" class="card">
        <h2>RTM Training</h2>
        <p>Fundamentos de redes (nível CCNA básico)</p>
        <button onclick="startQuiz()">Iniciar</button>
    </div>

    <div id="quizScreen" class="card hidden">
        <h3 id="question"></h3>
        <div id="options"></div>
    </div>

    <div id="resultScreen" class="card hidden">
        <h2>Resultado</h2>
        <p id="score"></p>
        <button onclick="location.reload()">Refazer</button>
    </div>

</div>

<div class="footer">
    © RTM • Plataforma interna de capacitação
</div>

<script>

const questions = [
    // INTRO CCNA (mais realistas)
    {q:"Qual camada do modelo OSI é responsável pelo endereçamento IP?", a:["Camada 3","Camada 2","Camada 4"], c:0},
    {q:"Qual protocolo é utilizado para resolver IP em MAC?", a:["ARP","DNS","ICMP"], c:0},
    {q:"O que um switch faz com um frame broadcast?", a:["Envia para todas as portas","Descarta","Envia para gateway"], c:0},
    {q:"Qual é a função do default gateway?", a:["Encaminhar tráfego para outras redes","Resolver DNS","Filtrar pacotes"], c:0},
    {q:"Qual protocolo é orientado à conexão?", a:["TCP","UDP","ICMP"], c:0},
    {q:"Qual comando verifica conectividade?", a:["ping","show ip route","traceroute"], c:0},
    {q:"O que significa /24?", a:["255.255.255.0","255.0.0.0","255.255.0.0"], c:0},
    {q:"Qual equipamento opera na camada 2?", a:["Switch","Router","Firewall"], c:0},

    // BGP
    {q:"BGP estabelece vizinhança usando qual protocolo?", a:["TCP","UDP","ICMP"], c:0},
    {q:"O atributo AS_PATH serve para?", a:["Evitar loop de rota","Definir VLAN","Criptografar"], c:0},

    // ROTA ESTÁTICA
    {q:"Rota estática precisa de qual informação?", a:["Next-hop","MAC address","DNS"], c:0},
    {q:"Qual comando cria rota padrão?", a:["ip route 0.0.0.0 0.0.0.0","router bgp","show route"], c:0},

    // ROTEADOR
    {q:"Ver tabela de rotas:", a:["show ip route","show running-config","show vlan"], c:0},
    {q:"Ver IP das interfaces:", a:["show ip interface brief","show mac","show arp"], c:0},

    // SWITCH
    {q:"Tabela MAC:", a:["show mac address-table","show ip route","show bgp"], c:0},
    {q:"Ver VLANs:", a:["show vlan brief","show ip route","show arp"], c:0},

    // INTERFACE
    {q:"Entrar em interface:", a:["interface g0/1","router bgp","ip route"], c:0},
    {q:"Configurar IP:", a:["ip address","ping","show"], c:0},
];

let index = 0;
let score = 0;

function startQuiz() {
    document.getElementById("startScreen").classList.add("hidden");
    document.getElementById("quizScreen").classList.remove("hidden");
    loadQuestion();
}

function loadQuestion() {
    if (index >= questions.length) return showResult();

    let q = questions[index];
    document.getElementById("question").innerText = q.q;

    let optionsDiv = document.getElementById("options");
    optionsDiv.innerHTML = "";

    q.a.forEach((opt, i) => {
        let btn = document.createElement("div");
        btn.className = "option";
        btn.innerText = opt;
        btn.onclick = () => selectAnswer(i);
        optionsDiv.appendChild(btn);
    });
}

function selectAnswer(i) {
    if (i === questions[index].c) score++;
    index++;
    loadQuestion();
}

function showResult() {
    document.getElementById("quizScreen").classList.add("hidden");
    document.getElementById("resultScreen").classList.remove("hidden");

    document.getElementById("score").innerText =
        `Score: ${score}/${questions.length}`;
}

</script>

</body>
</html>
